<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Reader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header class="app-header">
  <span class="logo">📖 <span>Social</span>Reader</span>
  <div class="header-right">
    <div class="user-badge">
      <span id="user-name"></span>
      <span class="role-tag" id="user-role"></span>
    </div>
    <button class="btn-ghost" onclick="logout()">Sign out</button>
  </div>
</header>

<main class="page-body">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px">
    <div>
      <h2 class="page-title" id="page-greeting">My Classes</h2>
      <p class="page-sub" id="page-sub"></p>
    </div>
    <button id="action-btn" class="btn-upload" style="display:none"></button>
  </div>

  <div id="classes-container">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</main>

<!-- Create class modal -->
<div class="modal-overlay" id="create-class-modal">
  <div class="modal">
    <h3>새 수업 개설</h3>
    <div class="form-group">
      <label>수업명</label>
      <input id="class-name-input" type="text" placeholder="예: AI와 학습데이터 2024 봄" style="width:100%;padding:10px 12px" />
    </div>
    <div class="form-group">
      <label>수업 설명 <span style="color:var(--muted);font-weight:400">(선택)</span></label>
      <input id="class-desc-input" type="text" placeholder="간단한 설명…" style="width:100%;padding:10px 12px" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="create-class-cancel">취소</button>
      <button class="btn-save" id="create-class-save">개설하기</button>
    </div>
    <div class="error-msg" id="create-class-error"></div>
  </div>
</div>

<!-- Join class modal -->
<div class="modal-overlay" id="join-class-modal">
  <div class="modal">
    <h3>수업 참여</h3>
    <div class="form-group">
      <label>참여 코드</label>
      <input id="join-code-input" type="text" placeholder="ABC123"
        style="width:100%;padding:12px;text-transform:uppercase;letter-spacing:4px;font-size:22px;font-weight:700;text-align:center" maxlength="6" />
      <div class="hint">교수님께 받은 6자리 코드를 입력하세요</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="join-class-cancel">취소</button>
      <button class="btn-save" id="join-class-save">참여하기</button>
    </div>
    <div class="error-msg" id="join-class-error"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/app.js"></script>
<script>
if (!requireAuth()) throw new Error('redirect');

const user = getUser();
document.getElementById('user-name').textContent = user.display_name;
document.getElementById('user-role').textContent = user.role === 'instructor' ? 'Instructor' : 'Student';

const actionBtn = document.getElementById('action-btn');
actionBtn.style.display = '';
if (user.role === 'instructor') {
  document.getElementById('page-sub').textContent = '수업을 개설하고 논문을 업로드하세요.';
  actionBtn.textContent = '+ 수업 개설';
  actionBtn.addEventListener('click', () => document.getElementById('create-class-modal').classList.add('open'));
} else {
  document.getElementById('page-sub').textContent = '참여 중인 수업을 선택해 논문을 읽어보세요.';
  actionBtn.textContent = '+ 수업 참여';
  actionBtn.addEventListener('click', () => document.getElementById('join-class-modal').classList.add('open'));
}

// ── Load classes ──────────────────────────────────────────────────────────────
async function loadClasses() {
  const container = document.getElementById('classes-container');
  container.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const classes = await API.get('/api/classes');
    if (!classes.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🏫</div>
          <p>${user.role === 'instructor'
            ? '"수업 개설" 버튼으로 첫 수업을 만들어보세요!'
            : '아직 참여한 수업이 없어요.<br>"수업 참여" 버튼으로 코드를 입력해 참여하세요.'}</p>
        </div>`;
      return;
    }
    container.innerHTML = '<div class="classes-grid" id="classes-grid"></div>';
    const grid = document.getElementById('classes-grid');
    classes.forEach(cls => {
      const card = document.createElement('div');
      card.className = 'class-card';
      card.innerHTML = `
        <div class="class-card-top">
          <div style="flex:1;min-width:0">
            <h3 class="class-card-name">${escHtml(cls.name)}</h3>
            ${cls.description ? `<p class="class-card-desc">${escHtml(cls.description)}</p>` : ''}
          </div>
        </div>
        <div class="class-card-stats">
          <span>📄 논문 ${cls.article_count}개</span>
          <span>👥 ${cls.member_count}명</span>
          ${user.role === 'instructor' ? `
            <span class="class-code-inline" title="참여 코드 클릭해서 복사" onclick="copyCode('${cls.join_code}',event)">
              🔑 ${cls.join_code}
            </span>` : ''}
        </div>
        <div class="class-card-footer">
          <button class="class-enter-btn" data-id="${cls.id}">수업 입장 →</button>
          ${user.role === 'instructor' ? `<button class="class-delete-btn" data-id="${cls.id}" data-name="${escHtml(cls.name)}">삭제</button>` : ''}
        </div>`;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.class-enter-btn').forEach(btn =>
      btn.addEventListener('click', () => window.location.href = `/class/${btn.dataset.id}`)
    );
    grid.querySelectorAll('.class-delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`"${btn.dataset.name}" 수업을 삭제할까요?`)) return;
        await API.del(`/api/classes/${btn.dataset.id}`);
        showToast('수업이 삭제됐어요.'); loadClasses();
      });
    });
  } catch (ex) {
    container.innerHTML = `<p style="color:var(--danger);padding:20px">${ex.message}</p>`;
  }
}

function copyCode(code, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(code);
  showToast(`참여 코드 복사됨: ${code}`);
}

// ── Create class ──────────────────────────────────────────────────────────────
document.getElementById('create-class-cancel').addEventListener('click', () =>
  document.getElementById('create-class-modal').classList.remove('open')
);
document.getElementById('create-class-save').addEventListener('click', async () => {
  const name = document.getElementById('class-name-input').value.trim();
  const desc = document.getElementById('class-desc-input').value.trim();
  const err  = document.getElementById('create-class-error');
  if (!name) { err.textContent = '수업명을 입력해주세요.'; return; }
  err.textContent = '';
  try {
    const cls = await API.post('/api/classes', { name, description: desc });
    document.getElementById('create-class-modal').classList.remove('open');
    document.getElementById('class-name-input').value = '';
    document.getElementById('class-desc-input').value = '';
    showToast(`"${cls.name}" 수업 개설 완료! 🎉`);
    loadClasses();
  } catch (ex) { err.textContent = ex.message; }
});

// ── Join class ────────────────────────────────────────────────────────────────
document.getElementById('join-class-cancel').addEventListener('click', () =>
  document.getElementById('join-class-modal').classList.remove('open')
);
document.getElementById('join-code-input').addEventListener('input', e =>
  e.target.value = e.target.value.toUpperCase()
);
document.getElementById('join-class-save').addEventListener('click', async () => {
  const code = document.getElementById('join-code-input').value.trim();
  const err  = document.getElementById('join-class-error');
  if (!code) { err.textContent = '코드를 입력해주세요.'; return; }
  err.textContent = '';
  try {
    const cls = await API.post('/api/classes/join', { join_code: code });
    document.getElementById('join-class-modal').classList.remove('open');
    document.getElementById('join-code-input').value = '';
    showToast(`"${cls.name}" 수업에 참여했어요! 🎉`);
    loadClasses();
  } catch (ex) { err.textContent = ex.message; }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadClasses();
</script>
</body>
</html>
